<!doctype html>
<!-- Root locale redirect: replaces middleware.ts (unavailable on static export). -->
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>TERREYA</title>
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url=/ru/">
  <script>
    var l = (navigator.language || 'ru').toLowerCase();
    location.replace(l.indexOf('en') === 0 ? '/en/' : '/ru/');
  </script>
</head>
<body>
  <a href="/ru/">TERREYA →</a>
</body>
</html>
